<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Management</title>
    <style>
        :root { --cb-blue: #004171; --cb-light: #bfe4ff; --cb-teal: #42ba85; --bg: #f0f4f8; --danger: #e53e3e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-top: 100px; }
        .float-nav { position: fixed; top: 0; left: 0; right: 0; background: var(--cb-blue); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; color: white; }
        .nav-links a { color: white; text-decoration: none; margin-right: 20px; font-weight: bold; opacity: 0.7; }
        .nav-links a.active { opacity: 1; border-bottom: 2px solid var(--cb-light); }
        .container { max-width: 1000px; margin: auto; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .patient-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .patient-item:hover { background: var(--cb-light); }
        .urgent-tag { background: #fee2e2; color: #dc2626; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: bold; }
        .history-card { font-size: 14px; border-left: 3px solid var(--cb-teal); padding-left: 10px; margin-bottom: 10px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        /* New Styles for Delete Functionality */
        .del-btn-small { background: none; border: none; color: #999; cursor: pointer; padding: 5px; font-size: 18px; transition: 0.2s; }
        .del-btn-small:hover { color: var(--danger); }
        .btn-danger-outline { width: 100%; background: transparent; color: var(--danger); border: 2px solid var(--danger); padding: 10px; border-radius: 8px; margin-top: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-danger-outline:hover { background: var(--danger); color: white; }
    </style>
</head>
<body>
    <div class="float-nav">
        <div class="nav-links">
            <a href="index.html">Home</a><a href="patients.html" class="active">Patients</a><a href="triage.html">Triage</a><a href="inventory.html">Inventory</a>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <h3>Register New Patient</h3>
            <input type="text" id="p_name" placeholder="Full Name">
            <input type="number" id="p_age" placeholder="Age">
            <input type="text" id="p_village" placeholder="Village Name">
            <button onclick="addPatient()" style="width:100%; background:var(--cb-blue); color:white; padding:10px; border:none; border-radius:8px; margin-top:10px; cursor:pointer; font-weight:bold;">Register Patient</button>
            <hr style="margin: 20px 0; opacity: 0.2;">
            <h3>Patient Directory</h3>
            <div id="patientList"></div>
        </div>
        <div class="card" id="detailsView">
            <h3>Patient Details</h3>
            <p style="color: #666;">Select a patient to view history and vitals.</p>
        </div>
    </div>

    <script>
        async function addPatient() {
            const name = document.getElementById('p_name').value;
            const age = document.getElementById('p_age').value;
            const village = document.getElementById('p_village').value;
            if(!name || !age || !village) return alert("Please fill all fields");
            
            await fetch('http://127.0.0.1:5005/add-patient', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name, age, village})
            });
            location.reload();
        }

        async function loadPatients() {
            try {
                const res = await fetch('http://127.0.0.1:5005/get-patients');
                const patients = await res.json();
                const list = document.getElementById('patientList');
                
                if (Object.keys(patients).length === 0) {
                    list.innerHTML = "<p style='color:#999; text-align:center;'>No patients found.</p>";
                    return;
                }

                list.innerHTML = Object.entries(patients).map(([id, p]) => `
                    <div class="patient-item">
                        <div onclick="viewPatient('${id}')" style="flex-grow: 1;">
                            <b>${p.name}</b><br><small>${id} | ${p.village}</small>
                        </div>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            ${p.history.some(h => h.diagnosis.includes("High")) ? '<span class="urgent-tag">URGENT</span>' : ''}
                            <button class="del-btn-small" onclick="deletePatient('${id}')" title="Delete Patient">×</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('patientList').innerHTML = "<p style='color:red;'>Failed to connect to server.</p>";
            }
        }

        async function deletePatient(id) {
            if(!confirm("Are you sure you want to permanently delete this patient record? This action cannot be undone.")) return;
            
            try {
                const res = await fetch('http://127.0.0.1:5005/delete-patient', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id})
                });
                
                if(res.ok) {
                    loadPatients();
                    document.getElementById('detailsView').innerHTML = "<h3>Patient Details</h3><p style='color: #666;'>Patient record deleted successfully.</p>";
                } else {
                    alert("Error deleting patient.");
                }
            } catch (e) {
                alert("Server connection error.");
            }
        }

        window.viewPatient = async (id) => {
            const res = await fetch('http://127.0.0.1:5005/get-patients');
            const patients = await res.json();
            const p = patients[id];
            
            if(!p) return;

            const details = document.getElementById('detailsView');
            details.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <h2>${p.name} (${p.age}y)</h2>
                    <small style="color:#999; margin-top:10px;">ID: ${id}</small>
                </div>
                <p><b>Village:</b> ${p.village}</p>
                
                <h4>Current Vitals:</h4>
                <div style="background:var(--bg); padding:15px; border-radius:8px; display:flex; justify-content:space-around;">
                    <div><small>Temp</small><br><b>${p.current_vitals.temp || '--'}°F</b></div>
                    <div><small>SpO2</small><br><b>${p.current_vitals.spo2 || '--'}%</b></div>
                    <div><small>BP</small><br><b>${p.current_vitals.bp || '--'}</b></div>
                </div>

                <h4>Medical History:</h4>
                <div style="max-height: 300px; overflow-y: auto; padding-right: 5px;">
                    ${p.history.length > 0 ? 
                        p.history.map(h => `
                            <div class="history-card">
                                <strong>${h.date}</strong><br>${h.diagnosis}
                            </div>
                        `).reverse().join('') 
                        : '<p style="color:#999">No history records found.</p>'
                    }
                </div>

                <button class="btn-danger-outline" onclick="deletePatient('${id}')">Delete Patient Record</button>
            `;
        };

        window.onload = loadPatients;
    </script>
</body>
</html>
