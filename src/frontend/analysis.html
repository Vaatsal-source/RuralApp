<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Visual Analysis</title>
    <style>
        :root { --cb-blue: #004171; --cb-light: #bfe4ff; --cb-teal: #42ba85; --cb-green: #42bb8a; --bg: #f0f4f8; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-top: 100px; }
        .float-nav { position: fixed; top: 0; left: 0; right: 0; background: var(--cb-blue); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: white; text-decoration: none; font-weight: bold; opacity: 0.7; }
        .nav-links a.active { opacity: 1; border-bottom: 2px solid var(--cb-light); }
        .container { max-width: 1100px; margin: auto; display: grid; grid-template-columns: 1fr 350px; gap: 25px; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .upload-area { border: 3px dashed var(--cb-light); padding: 40px; text-align: center; border-radius: 20px; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .upload-area:hover { background: #f0f9ff; border-color: var(--cb-blue); }
        #imgPreview { max-width: 100%; border-radius: 12px; margin-top: 15px; display: none; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--cb-blue); color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .res-card { margin-top: 25px; padding: 20px; border-radius: 15px; background: #f8fafc; border: 1px solid #e2e8f0; display: none; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--cb-light); margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="float-nav">
        <div class="logo">Care<span>Sathi</span> Vision</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="patients.html">Patients</a>
            <a href="analysis.html" class="active">Analysis</a>
            <a href="inventory.html" >Inventory</a>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2 id="t-title">🖼️ AI Visual Diagnostic</h2>
            
            <label><b>Link to Patient:</b></label>
            <select id="patientSelect">
                <option value="">-- Optional: Select Patient --</option>
            </select>

            <div class="upload-area" onclick="document.getElementById('imgInput').click()">
                <p id="t-up-text">Click to upload X-Ray or Skin Image</p>
                <input type="file" id="imgInput" hidden accept="image/*" onchange="previewFile()">
                <img id="imgPreview">
            </div>
            <button id="t-btn" onclick="runImageAnalysis()">Run Neural Analysis</button>

            <div class="res-card" id="imgResult">
                <h3 id="resLabel" style="color:var(--cb-blue); margin-top:0;">Processing...</h3>
                <p id="resExpl" style="line-height: 1.6; color: #444;"></p>
                <button onclick="saveAnalysisToHistory()" style="background:var(--cb-teal); margin-top:10px;">💾 Save to Patient Record</button>
            </div>
        </div>

        <div class="card" style="background: var(--cb-light); color: var(--cb-blue);">
            <h3>Instructions</h3>
            <p id="t-instr">How to use:</p>
            <p id="t-p1">1. Select image.</p>
            <p id="t-p2">2. Upload for AI scan.</p>
            <p id="t-p3">3. Review patterns.</p>
        </div>
    </div>

    <script>
        const API = "http://127.0.0.1:5005";

        async function loadPatients() {
            try {
                const res = await fetch(`${API}/get-patients`);
                const patients = await res.json();
                const select = document.getElementById("patientSelect");
                Object.entries(patients).forEach(([id, p]) => {
                    let opt = document.createElement("option");
                    opt.value = id;
                    opt.innerHTML = p.name;
                    select.appendChild(opt);
                });
            } catch(e) { console.error("Patients offline"); }
        }

        function previewFile() {
            const file = document.getElementById("imgInput").files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                const img = document.getElementById("imgPreview");
                img.src = reader.result;
                img.style.display = "block";
            };
            if(file) reader.readAsDataURL(file);
        }

        async function runImageAnalysis() {
            const file = document.getElementById("imgInput").files[0];
            if(!file) return alert("Please select an image first.");
            document.getElementById("imgResult").style.display = "block";
            document.getElementById("resLabel").innerText = "Processing...";
            
            const fd = new FormData(); fd.append('file', file);
            const res = await fetch(`${API}/analyze-image`, {method:'POST', body:fd});
            const d = await res.json();
            document.getElementById("resLabel").innerText = d.label;
            document.getElementById("resExpl").innerText = d.explanation;
        }

        async function saveAnalysisToHistory() {
            const pId = document.getElementById("patientSelect").value;
            const label = document.getElementById("resLabel").innerText;
            const expl = document.getElementById("resExpl").innerText;
            
            if(!pId) return alert("Please select a patient!");

            await fetch(`${API}/update-patient-medical`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    id: pId,
                    vitals: {},
                    diagnosis: `Visual Analysis: ${label}. Findings: ${expl}`
                })
            });
            alert("Analysis saved to history.");
        }

        window.onload = loadPatients;
    </script>
</body>
</html>
