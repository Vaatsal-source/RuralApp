<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Triage Assistant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --cb-blue: #004171; --cb-light: #bfe4ff; --cb-teal: #42ba85; --cb-green: #42bb8a; --bg: #f0f4f8; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-top: 100px; }
        .float-nav { position: fixed; top: 0; left: 0; right: 0; background: var(--cb-blue); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: white; text-decoration: none; font-weight: bold; opacity: 0.7; transition: 0.3s; }
        .nav-links a.active { opacity: 1; border-bottom: 2px solid var(--cb-light); }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .vitals { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; border: 2px solid var(--cb-light); border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-primary { background: var(--cb-blue); color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; transition: 0.3s; }
        .btn-primary:hover { background: var(--cb-teal); }
        .lang-select { background: white; border: none; padding: 5px 10px; border-radius: 15px; font-weight: bold; color: var(--cb-blue); cursor: pointer; }
    </style>
</head>
<body>
<div class="float-nav">
    <div class="nav-links">
        <a href="index.html">🏠 Home</a>
        <a href="triage.html" class="active">🩺 Triage</a>
        <a href="analysis.html">🖼️ Analysis</a>
        <a href="inventory.html">📦 Inventory</a>
    </div>
    <select class="lang-select" id="langPicker" onchange="changeLang()">
        <option value="en">English</option><option value="hi">हिंदी</option><option value="or">ଓଡ଼ିଆ</option><option value="ur">اردو</option>
    </select>
</div>
<div class="container">
    <div class="card">
        <h2 id="t-title">Triage Assistant</h2>
        <div class="vitals">
            <input type="number" id="v_temp" placeholder="Temp °F">
            <input type="number" id="v_spo2" placeholder="SpO2 %">
            <input type="text" id="v_bp" placeholder="BP (e.g. 120/80)">
        </div>
        <textarea id="symptomText" placeholder="..." style="height: 150px;"></textarea>
        <button class="btn-primary" id="t-diag-btn" onclick="runDiagnosis()">Process Patient Data</button>
        <button style="background:var(--cb-green); color:white;" class="btn-primary" id="voiceBtn"> Start Voice Input</button>
        <div id="diagBox" style="margin-top:20px; padding:20px; background:#f0f9ff; border-left:5px solid var(--cb-teal); display:none; border-radius: 0 8px 8px 0;">
            <div id="diagText" style="white-space: pre-wrap; font-weight: 500;"></div>
            <button onclick="generatePDF()" style="margin-top:10px; padding:5px 10px; cursor:pointer;">Download Referral PDF</button>
        </div>
    </div>
</div>
<script>
    const API = "http://127.0.0.1:5005";
    const trans = { 
        en: {title:"Smart Triage Assistant", btn:"Process Patient Data", voice:"Start Voice Input"}, 
        hi: {title:"स्मार्ट ट्राइएज सहायक", btn:"मरीज डेटा प्रोसेस करें", voice:"आवाज इनपुट शुरू करें"},
        or: {title:"ସ୍ମାର୍ଟ ଟ୍ରାଇଏଜ୍ ସହାୟକ", btn:"ରୋଗୀ ତଥ୍ୟ ପ୍ରକ୍ରିୟାକରଣ", voice:"ସ୍ୱର ଇନପୁଟ୍ ଆରମ୍ଭ"},
        ur: {title:"اسمارٹ ٹرائیج اسسٹنٹ", btn:"مریض کا ڈیٹا پروسیس کریں", voice:"آواز ان پٹ شروع کریں"}
    };

    function changeLang() {
        const lang = document.getElementById("langPicker").value;
        localStorage.setItem("cs_lang", lang);
        document.getElementById("t-title").innerText = trans[lang].title;
        document.getElementById("t-diag-btn").innerText = trans[lang].btn;
        document.getElementById("voiceBtn").innerText = "🎤 " + trans[lang].voice;
    }

    async function runDiagnosis() {
        const text = document.getElementById("symptomText").value;
        const vitals = { temp: document.getElementById("v_temp").value, spo2: document.getElementById("v_spo2").value, bp: document.getElementById("v_bp").value };
        document.getElementById("diagBox").style.display = "block";
        document.getElementById("diagText").innerText = "Analyzing vitals and symptoms...";
        
        const res = await fetch(`${API}/analyze-text`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text, vitals}) });
        const d = await res.json();
        document.getElementById("diagText").innerText = d.diagnosis;
        
        let q = JSON.parse(localStorage.getItem("cs_q") || "[]");
        q.unshift({ time: new Date().toLocaleTimeString(), symp: text.slice(0, 30), isHigh: d.diagnosis.includes("High") });
        localStorage.setItem("cs_q", JSON.stringify(q.slice(0,15)));
    }

    let chunks = [];
    document.getElementById("voiceBtn").onclick = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        const rec = new MediaRecorder(stream);
        rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = async () => {
            const fd = new FormData(); fd.append('file', new Blob(chunks), 'v.wav');
            const res = await fetch(`${API}/transcribe`, {method:'POST', body:fd});
            const d = await res.json();
            document.getElementById("symptomText").value = d.transcript;
            chunks = []; runDiagnosis();
        };
        rec.start();
        document.getElementById("voiceBtn").innerText = "🔴 Listening...";
        setTimeout(() => { rec.stop(); document.getElementById("voiceBtn").innerText = "🎤 Start Voice Input"; }, 5000);
    };

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("CareSathi Medical Referral", 20, 20);
        doc.text(`Symptoms: ${document.getElementById("symptomText").value}`, 20, 40);
        doc.text(`Diagnosis: ${document.getElementById("diagText").innerText}`, 20, 60);
        doc.save("referral.pdf");
    }

    window.onload = () => { 
        document.getElementById("langPicker").value = localStorage.getItem("cs_lang") || "en"; 
        changeLang(); 
    };
</script>
</body>
</html>
